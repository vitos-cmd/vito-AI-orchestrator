<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Orchestrator · Vito Zero</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      border-bottom: 1px solid #222;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: #111;
      border: 1px solid #333;
      color: white;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      resize: none;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      background: #1a73e8;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #1666c4;
    }

    .log-box {
      margin-top: 25px;
      padding: 15px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      height: 250px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <header>AI Orchestrator · Vito Zero</header>

  <div class="container">
    <h2>Invia una richiesta</h2>

    <textarea id="userInput" placeholder="Scrivi qui la tua richiesta..."></textarea>
    <button id="sendBtn">Invia al backend</button>

    <h3>Log</h3>
    <div id="log" class="log-box"></div>
  </div>

  <script>
    const WORKER_URL = "https://shy-butterfly-dca9.rallo-vito.workers.dev/";

    const logBox = document.getElementById("log");
    const sendBtn = document.getElementById("sendBtn");

    function log(msg) {
      logBox.textContent += msg + "\n";
      logBox.scrollTop = logBox.scrollHeight;
    }

    sendBtn.addEventListener("click", async () => {
      const text = document.getElementById("userInput").value.trim();
      if (!text) {
        log("⚠ Nessun testo inserito.");
        return;
      }

      log("➡ Inviato al backend: " + text);

      try {
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        const data = await response.json();
        log("⬅ Risposta dal backend:");
        log(JSON.stringify(data, null, 2));

      } catch (err) {
        log("❌ Errore: " + err);
      }
    });
  </script>
</body>
</html>
