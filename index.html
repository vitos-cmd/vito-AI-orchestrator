<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>GLYCO · Data Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #050608;
      color: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      min-height: 100vh;
      justify-content: center;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 900px;
      padding: 24px;
      border-radius: 16px;
      background: radial-gradient(circle at top left, #1f2933, #050608);
      box-shadow: 0 18px 45px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.06);
    }
    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 20px;
    }
    label {
      font-size: 13px;
      color: #d1d5db;
      display: block;
      margin-bottom: 6px;
    }
    textarea, input {
      width: 100%;
      background: rgba(15,23,42,0.9);
      border-radius: 10px;
      border: 1px solid rgba(148,163,184,0.5);
      color: #e5e7eb;
      padding: 10px 12px;
      font-size: 13px;
      resize: vertical;
      outline: none;
    }
    button {
      margin-top: 12px;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #020617;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    .log {
      margin-top: 18px;
      font-size: 12px;
      background: rgba(15,23,42,0.9);
      border-radius: 10px;
      border: 1px solid rgba(55,65,81,0.8);
      padding: 10px 12px;
      white-space: pre-wrap;
      max-height: 320px;
      overflow: auto;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(148,163,184,0.4);
      margin-bottom: 12px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
    }
  </style>

  <!-- AJV VALIDATOR -->
  <script src="https://cdn.jsdelivr.net/npm/ajv@8.12.0/dist/ajv7.min.js"></script>
</head>

<body>
  <div class="container">
    <h1>GLYCO · Data Builder</h1>
    <div class="subtitle">Generatore di schede alimenti in formato JSON, pronte per il database.</div>

    <div class="badge">
      <span class="dot"></span>
      <span>Workers AI · Llama 3 · Cloudflare</span>
    </div>

    <div class="row">
      <div>
        <label>Nome alimento</label>
        <input id="foodName" placeholder="Es. Banana matura" />
      </div>
      <div>
        <label>Note / contesto (opzionale)</label>
        <input id="notes" placeholder="Es. porzione tipica, uso, fonte..." />
      </div>
    </div>

    <label>Istruzioni aggiuntive (opzionale)</label>
    <textarea id="rawPrompt" rows="3"></textarea>

    <button id="sendBtn">Genera scheda JSON</button>

    <div class="log" id="log"></div>
  </div>

  <script>
    const btn = document.getElementById('sendBtn');
    const logEl = document.getElementById('log');

    async function callBackend(message) {
      const res = await fetch('https://shy-butterfly-dca9.rallo-vito.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      const data = await res.json();

      if (data.response && typeof data.response === "string") {
        try {
          data.parsed = JSON.parse(data.response);
        } catch {
          data.parsed = null;
        }
      }

      return data;
    }

    // -----------------------------
    // NORMALIZZATORE GLYCO v1.0
    // -----------------------------
    function normalizeGlyco(json) {
      if (!json || typeof json !== "object") return json;

      // Ordina le chiavi
      const ordered = {};
      const order = [
        "id","nome","categoria","sottocategoria","sinonimi",
        "porzione_standard_g","macronutrienti","micronutrienti",
        "glicemia","follow_up","note"
      ];
      order.forEach(k => { if (json[k] !== undefined) ordered[k] = json[k]; });

      // Normalizza stringhe
      if (ordered.nome) ordered.nome = ordered.nome.trim();
      if (ordered.categoria) ordered.categoria = ordered.categoria.trim();
      if (ordered.sottocategoria) ordered.sottocategoria = ordered.sottocategoria.trim();

      return ordered;
    }

    // -----------------------------
    // VALIDATORE GLYCO INLINE
    // -----------------------------
    async function validateGlycoInline(jsonData) {
      const schema = await fetch("https://vitos-cmd.github.io/glyco-schema-v1.json")
        .then(r => r.json());

      const ajv = new Ajv({ allErrors: true });
      const validate = ajv.compile(schema);

      const valid = validate(jsonData);

      return {
        valido: valid,
        errori: validate.errors || []
      };
    }

    // -----------------------------
    // CLICK HANDLER
    // -----------------------------
    btn.addEventListener('click', async () => {
      const foodName = document.getElementById('foodName').value.trim();
      const notes = document.getElementById('notes').value.trim();
      const rawPrompt = document.getElementById('rawPrompt').value.trim();

      if (!foodName) {
        alert("Inserisci almeno il nome dell'alimento.");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Generazione...";
      logEl.textContent = "⏳ Generazione in corso...\n";

      const userMessage = `
Alimento: ${foodName}
Note: ${notes || 'Nessuna'}
Istruzioni aggiuntive: ${rawPrompt || 'Nessuna'}
Genera la scheda completa in JSON secondo GLYCO v1.0.
`.trim();

      try {
        const response = await callBackend(userMessage);

        if (!response.parsed) {
          logEl.textContent = "❌ JSON non interpretabile:\n\n" + response.response;
          return;
        }

        const normalized = normalizeGlyco(response.parsed);
        logEl.textContent = JSON.stringify(normalized, null, 2);

        const validation = await validateGlycoInline(normalized);

        if (!validation.valido) {
          logEl.textContent += "\n\n⚠️ ERRORI DI VALIDAZIONE:\n" +
            JSON.stringify(validation.errori, null, 2);
        } else {
          logEl.textContent += "\n\n✅ Scheda GLYCO valida.";
        }

      } catch (err) {
        logEl.textContent = "Errore backend: " + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Genera scheda JSON";
      }
    });
  </script>
</body>
</html>
