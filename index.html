<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>AI Orchestrator · Vito Zero</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      background: #05060a;
      color: #f5f5f5;
    }
    header {
      padding: 16px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #050608;
    }
    header h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    header span {
      font-size: 11px;
      opacity: 0.7;
    }
    main {
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    .panel {
      background: #111319;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
      border: 1px solid #1f222b;
    }
    .panel h2 {
      font-size: 14px;
      margin: 0 0 8px 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a0a4b8;
    }
    label {
      font-size: 12px;
      display: block;
      margin-bottom: 4px;
      color: #c3c7d9;
    }
    textarea, select, input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #2a2e3a;
      background: #05060a;
      color: #f5f5f5;
      padding: 8px 10px;
      font-size: 13px;
      resize: vertical;
    }
    textarea {
      min-height: 90px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .col {
      flex: 1 1 180px;
    }
    button {
      border-radius: 999px;
      border: none;
      padding: 9px 18px;
      font-size: 13px;
      cursor: pointer;
      background: #2f7df4;
      color: white;
      font-weight: 500;
      margin-right: 8px;
    }
    button.secondary {
      background: #222633;
      color: #d0d3e0;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .chip {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid #2a2e3a;
      cursor: pointer;
      background: #05060a;
    }
    .chip.active {
      background: #2f7df4;
      border-color: #2f7df4;
      color: white;
    }
    .log {
      font-family: "JetBrains Mono", "SF Mono", Menlo, monospace;
      font-size: 11px;
      background: #05060a;
      border-radius: 8px;
      padding: 8px 10px;
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid #1f222b;
      white-space: pre-wrap;
    }
    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid #2a2e3a;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Vito Zero · AI Orchestrator</h1>
      <span>Interfaccia unica per agenti, notebook e Drive</span>
    </div>
    <div>
      <span class="badge">BETA · web</span>
    </div>
  </header>

  <main>
    <!-- 1. Richiesta di Vito -->
    <section class="panel">
      <h2>1 · Cosa vuoi che faccia?</h2>
      <label for="userRequest">Descrivi la tua richiesta (es: “cerca studi su glicemia e crea un report”).</label>
      <textarea id="userRequest" placeholder="Scrivi qui la tua richiesta..."></textarea>
      <div class="chips" id="behaviorChips">
        <div class="chip" data-behavior="scientifico">Stile scientifico</div>
        <div class="chip" data-behavior="sintetico">Sintetico</div>
        <div class="chip" data-behavior="didattico">Didattico</div>
        <div class="chip" data-behavior="creativo">Creativo</div>
      </div>
    </section>

    <!-- 2. Scelta agente e comportamento -->
    <section class="panel">
      <h2>2 · Scelta agente e comportamento</h2>
      <div class="row">
        <div class="col">
          <label for="agentSelect">Agente (in futuro: selezione automatica)</label>
          <select id="agentSelect">
            <option value="auto">Selezione automatica (futuro)</option>
            <option value="web_researcher">Web Researcher</option>
            <option value="notebook_writer">Notebook / LLM Writer</option>
            <option value="drive_manager">Drive Manager</option>
            <option value="report_generator">Report Generator</option>
          </select>
        </div>
        <div class="col">
          <label for="toneInput">Come deve comportarsi? (tono, ruolo, vincoli)</label>
          <input id="toneInput" type="text" placeholder="Es: rigoroso, cita le fonti, niente opinioni personali..." />
        </div>
      </div>
    </section>

    <!-- 3. Output: formato e destinazione -->
    <section class="panel">
      <h2>3 · Formato del documento e destinazione</h2>
      <div class="row">
        <div class="col">
          <label for="docTitle">Titolo del documento</label>
          <input id="docTitle" type="text" placeholder="Es: Report glicemia post-prandiale · v1" />
        </div>
        <div class="col">
          <label for="formatSelect">Formato file</label>
          <select id="formatSelect">
            <option value="md">Markdown (.md)</option>
            <option value="pdf">PDF (.pdf)</option>
            <option value="docx">Word (.docx)</option>
            <option value="txt">Testo (.txt)</option>
          </select>
        </div>
      </div>

      <div class="row" style="margin-top: 10px;">
        <div class="col">
          <label for="destinationSelect">Dove salvarlo?</label>
          <select id="destinationSelect">
            <option value="drive">Cartella Drive collegata</option>
            <option value="local">Scarica sul dispositivo</option>
          </select>
        </div>
        <div class="col">
          <label for="driveFolderId">ID cartella Drive (già collegata)</label>
          <input id="driveFolderId" type="text"
                 placeholder="1RnZsEDQN6lTj5dpe-R_TLw5lGnlqq9ey" />
        </div>
      </div>
    </section>

    <!-- 4. Controllo -->
    <section class="panel">
      <h2>4 · Esecuzione</h2>
      <button id="runButton">Esegui richiesta</button>
      <button id="clearLog" class="secondary">Pulisci log</button>
      <div style="margin-top: 10px;">
        <label>Log / simulazione decisioni</label>
        <div id="log" class="log"></div>
      </div>
    </section>
  </main>

  <script>
    const logEl = document.getElementById("log");
    const runButton = document.getElementById("runButton");
    const clearLogButton = document.getElementById("clearLog");
    const behaviorChips = document.getElementById("behaviorChips");

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] ${msg}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    behaviorChips.addEventListener("click", (e) => {
      const chip = e.target.closest(".chip");
      if (!chip) return;
      [...behaviorChips.querySelectorAll(".chip")].forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
    });

    clearLogButton.addEventListener("click", () => {
      logEl.textContent = "";
    });

    runButton.addEventListener("click", () => {
      const request = document.getElementById("userRequest").value.trim();
      const agent = document.getElementById("agentSelect").value;
      const tone = document.getElementById("toneInput").value.trim();
      const title = document.getElementById("docTitle").value.trim() || "Documento senza titolo";
      const format = document.getElementById("formatSelect").value;
      const destination = document.getElementById("destinationSelect").value;
      const folderId = document.getElementById("driveFolderId").value.trim();
      const activeChip = behaviorChips.querySelector(".chip.active");
      const behavior = activeChip ? activeChip.dataset.behavior : "non specificato";

      if (!request) {
        log("⚠ Nessuna richiesta inserita.");
        return;
      }

      log("— Nuova richiesta ricevuta —");
      log(`Richiesta: ${request}`);
      log(`Comportamento: ${behavior} | Dettagli: ${tone || "nessuno"}`);
      log(`Agente selezionato: ${agent}`);
      log(`Titolo documento: ${title}`);
      log(`Formato: ${format}`);
      log(`Destinazione: ${destination === "drive" ? "Google Drive" : "Download locale"}`);
      if (destination === "drive") {
        log(`ID cartella Drive: ${folderId || "(manca, usare quello collegato)"}`);
      }

      // QUI, IN FUTURO:
      // - chiamerai il tuo backend (API)
      // - il backend userà gli agenti (web, notebook, drive, ecc.)
      // - genererà il documento nel formato richiesto
      // - lo salverà in Drive o lo restituirà come download
      log("Simulazione: l'orchestratore deciderebbe ora quale agente chiamare e come comporre la pipeline.");
    });
  </script>
</body>
</html>
